<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상생협력부 소식함</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; box-sizing: border-box; }
    * { box-sizing: border-box; }
    .card-enter { animation: cardIn 0.4s ease-out both; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-in { animation: modalIn 0.3s ease-out; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .tag-pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
    .news-card:hover { border-color: #4f46e5 !important; box-shadow: 0 4px 20px rgba(79,70,229,0.08); }
  </style>
</head>
<body style="font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; min-height: 100vh;">

  <!-- Header -->
  <header style="background: #ffffff; border-bottom: 1px solid #e8eaf0;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 36px 24px 28px;">
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 6px;">
        <div style="width: 42px; height: 42px; background: linear-gradient(135deg, #4f46e5, #818cf8); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
          <i data-lucide="newspaper" style="width:20px;height:20px;color:#fff;"></i>
        </div>
        <h1 style="font-size: 24px; font-weight: 700; color: #1e1f2e; letter-spacing: -0.5px; margin: 0;">상생협력부 소식함</h1>
      </div>
      <p style="color: #9094a8; font-size: 14px; margin: 0 0 0 56px;">카드뉴스·교섭 소식·홍보물을 한곳에서</p>
    </div>
  </header>

  <!-- Toolbar -->
  <div style="max-width: 1100px; margin: 0 auto; padding: 24px 24px 0;">
    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;">
      <div style="position: relative; flex: 1; min-width: 200px; max-width: 400px;">
        <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#aaa;"></i>
        <input id="search-input" type="text" placeholder="제목 또는 카테고리 검색..."
          style="width:100%;padding:10px 14px 10px 38px;background:#ffffff;border:1px solid #e0e2ec;border-radius:10px;color:#333;font-size:13px;outline:none;"
          onfocus="this.style.borderColor='#4f46e5'" onblur="this.style.borderColor='#e0e2ec'">
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="category-filter" style="padding:10px 14px;background:#ffffff;border:1px solid #e0e2ec;border-radius:10px;color:#333;font-size:13px;outline:none;">
          <option value="">전체 카테고리</option>
        </select>
        <button onclick="openAddModal()" style="display:flex;align-items:center;gap:6px;padding:10px 20px;background:linear-gradient(135deg,#4f46e5,#818cf8);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> 등록
        </button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div style="max-width:1100px;margin:0 auto;padding:14px 24px 0;">
    <p id="stats-text" style="color:#b0b4c8;font-size:12px;">총 0건의 소식</p>
  </div>

  <!-- Card Grid -->
  <main style="max-width:1100px;margin:0 auto;padding:16px 24px 60px;">
    <div id="card-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;"></div>
    <div id="empty-state" style="text-align:center;padding:80px 20px;">
      <div style="width:64px;height:64px;background:#eef0f8;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i data-lucide="inbox" style="width:28px;height:28px;color:#c0c4d8;"></i>
      </div>
      <p style="color:#9094a8;font-size:15px;font-weight:500;">등록된 소식이 없습니다</p>
      <p style="color:#b8bcd0;font-size:13px;margin-top:4px;">상단의 '등록' 버튼으로 첫 소식을 추가해보세요</p>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal-overlay" class="overlay">
    <div class="modal-in" style="background:#ffffff;border:1px solid #e8eaf0;border-radius:16px;width:100%;max-width:480px;padding:32px;position:relative;">
      <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:#aaa;">
        <i data-lucide="x" style="width:20px;height:20px;"></i>
      </button>
      <h2 id="modal-title" style="font-size:20px;font-weight:700;color:#1e1f2e;margin-bottom:24px;">소식 등록</h2>
      <div>
        <input type="hidden" id="edit-id" value="">
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#9094a8;font-size:12px;font-weight:500;margin-bottom:6px;">제목 *</label>
          <input id="f-title" style="width:100%;padding:10px 14px;background:#f8f9fc;border:1px solid #e0e2ec;border-radius:8px;color:#333;font-size:14px;outline:none;" placeholder="소식 제목">
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#9094a8;font-size:12px;font-weight:500;margin-bottom:6px;">설명</label>
          <textarea id="f-desc" rows="2" style="width:100%;padding:10px 14px;background:#f8f9fc;border:1px solid #e0e2ec;border-radius:8px;color:#333;font-size:14px;outline:none;resize:vertical;" placeholder="간단한 설명"></textarea>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#9094a8;font-size:12px;font-weight:500;margin-bottom:6px;">링크 URL *</label>
          <input id="f-link" style="width:100%;padding:10px 14px;background:#f8f9fc;border:1px solid #e0e2ec;border-radius:8px;color:#333;font-size:14px;outline:none;" placeholder="https://...">
        </div>
        <div style="display:flex;gap:12px;margin-bottom:16px;">
          <div style="flex:1;">
            <label style="display:block;color:#9094a8;font-size:12px;font-weight:500;margin-bottom:6px;">카테고리</label>
            <input id="f-category" style="width:100%;padding:10px 14px;background:#f8f9fc;border:1px solid #e0e2ec;border-radius:8px;color:#333;font-size:14px;outline:none;" placeholder="예: 카드뉴스, 교섭">
          </div>
          <div style="flex:1;">
            <label style="display:block;color:#9094a8;font-size:12px;font-weight:500;margin-bottom:6px;">발행일</label>
            <input id="f-date" type="date" style="width:100%;padding:10px 14px;background:#f8f9fc;border:1px solid #e0e2ec;border-radius:8px;color:#333;font-size:14px;outline:none;">
          </div>
        </div>
        <div id="form-error" style="display:none;color:#ef4444;font-size:12px;margin-bottom:12px;"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="closeModal()" style="padding:10px 20px;background:#f0f1f7;border:none;border-radius:8px;color:#9094a8;font-size:13px;cursor:pointer;">취소</button>
          <button onclick="handleSubmit()" style="padding:10px 24px;background:linear-gradient(135deg,#4f46e5,#818cf8);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm -->
  <div id="delete-overlay" class="overlay">
    <div style="background:#ffffff;border:1px solid #e8eaf0;border-radius:16px;width:100%;max-width:360px;padding:32px;text-align:center;">
      <div style="width:48px;height:48px;background:#fef2f2;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i data-lucide="trash-2" style="width:22px;height:22px;color:#ef4444;"></i>
      </div>
      <p style="color:#1e1f2e;font-size:16px;font-weight:600;margin-bottom:6px;">삭제하시겠습니까?</p>
      <p style="color:#9094a8;font-size:13px;margin-bottom:24px;">삭제하면 복구할 수 없습니다.</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button onclick="closeDeleteConfirm()" style="padding:10px 24px;background:#f0f1f7;border:none;border-radius:8px;color:#9094a8;font-size:13px;cursor:pointer;">취소</button>
        <button id="confirm-delete-btn" onclick="confirmDelete()" style="padding:10px 24px;background:#ef4444;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">삭제</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'cardnews_data';
    let allData = [];
    let deleteTarget = null;
    const categoryColors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#8b5cf6'];
    const categoryColorMap = {};
    let colorIdx = 0;

    function getCategoryColor(cat) {
      if (!cat) return '#aaa';
      if (!categoryColorMap[cat]) {
        categoryColorMap[cat] = categoryColors[colorIdx % categoryColors.length];
        colorIdx++;
      }
      return categoryColorMap[cat];
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        allData = raw ? JSON.parse(raw) : [];
      } catch(e) { allData = []; }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function getFilteredData() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      const cat = document.getElementById('category-filter').value;
      return allData.filter(item => {
        const matchQ = !q || (item.title||'').toLowerCase().includes(q) || (item.category||'').toLowerCase().includes(q) || (item.description||'').toLowerCase().includes(q);
        const matchCat = !cat || item.category === cat;
        return matchQ && matchCat;
      }).sort((a,b) => (b.published_at||b.created_at||'').localeCompare(a.published_at||a.created_at||''));
    }

    function renderCards() {
      const filtered = getFilteredData();
      const grid = document.getElementById('card-grid');
      const empty = document.getElementById('empty-state');
      const stats = document.getElementById('stats-text');

      stats.textContent = `총 ${allData.length}건의 소식` + (filtered.length !== allData.length ? ` (${filtered.length}건 표시)` : '');

      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        filtered.forEach((item, i) => grid.appendChild(createCardEl(item, i)));
      }
      lucide.createIcons();
    }

    function createCardEl(item, i) {
      const el = document.createElement('div');
      el.className = 'card-enter news-card';
      el.style.animationDelay = `${i * 0.05}s`;
      const catColor = getCategoryColor(item.category);
      const dateStr = item.published_at ? new Date(item.published_at).toLocaleDateString('ko-KR') : '';
      el.style.cssText = 'background:#ffffff;border:1px solid #e8eaf0;border-radius:14px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;';
      el.innerHTML = `
        <div style="padding:24px;">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
            <div style="flex:1;min-width:0;">
              ${item.category ? `<span class="tag-pill" style="background:${catColor}18;color:${catColor};margin-bottom:8px;">${item.category}</span>` : ''}
              <h3 style="color:#1e1f2e;font-size:16px;font-weight:700;margin:8px 0 0;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title || '제목 없음'}</h3>
            </div>
            <div style="display:flex;gap:4px;margin-left:8px;flex-shrink:0;">
              <button onclick="openEditModal('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#ccc;" onmouseenter="this.style.color='#4f46e5'" onmouseleave="this.style.color='#ccc'"><i data-lucide="edit" style="width:15px;height:15px;"></i></button>
              <button onclick="openDeleteConfirm('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#ccc;" onmouseenter="this.style.color='#ef4444'" onmouseleave="this.style.color='#ccc'"><i data-lucide="trash-2" style="width:15px;height:15px;"></i></button>
            </div>
          </div>
          ${item.description ? `<p style="color:#9094a8;font-size:13px;line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${item.description}</p>` : ''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #f0f1f7;">
            <span style="color:#c0c4d8;font-size:12px;display:flex;align-items:center;gap:4px;"><i data-lucide="calendar" style="width:12px;height:12px;"></i>${dateStr}</span>
            <a href="${item.link||'#'}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:4px;color:#4f46e5;font-size:12px;font-weight:500;text-decoration:none;">
              열기 <i data-lucide="external-link" style="width:12px;height:12px;"></i>
            </a>
          </div>
        </div>
      `;
      return el;
    }

    function updateCategoryFilter() {
      const sel = document.getElementById('category-filter');
      const current = sel.value;
      const cats = [...new Set(allData.map(d => d.category).filter(Boolean))].sort();
      sel.innerHTML = '<option value="">전체 카테고리</option>' + cats.map(c => `<option value="${c}"${c===current?' selected':''}>${c}</option>`).join('');
    }

    document.getElementById('search-input').addEventListener('input', renderCards);
    document.getElementById('category-filter').addEventListener('change', renderCards);

    function openAddModal() {
      document.getElementById('modal-title').textContent = '소식 등록';
      document.getElementById('edit-id').value = '';
      ['f-title','f-desc','f-link','f-category','f-date'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('form-error').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }

    function openEditModal(id) {
      const item = allData.find(d => d.id === id);
      if (!item) return;
      document.getElementById('modal-title').textContent = '소식 수정';
      document.getElementById('edit-id').value = id;
      document.getElementById('f-title').value = item.title || '';
      document.getElementById('f-desc').value = item.description || '';
      document.getElementById('f-link').value = item.link || '';
      document.getElementById('f-category').value = item.category || '';
      document.getElementById('f-date').value = item.published_at || '';
      document.getElementById('form-error').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }

    function handleSubmit() {
      const title = document.getElementById('f-title').value.trim();
      const link = document.getElementById('f-link').value.trim();
      const errEl = document.getElementById('form-error');
      if (!title) { errEl.textContent = '제목을 입력해주세요.'; errEl.style.display = 'block'; return; }
      if (!link) { errEl.textContent = '링크 URL을 입력해주세요.'; errEl.style.display = 'block'; return; }

      const editId = document.getElementById('edit-id').value;
      const record = {
        title,
        description: document.getElementById('f-desc').value.trim(),
        link,
        category: document.getElementById('f-category').value.trim(),
        published_at: document.getElementById('f-date').value,
      };

      if (editId) {
        const idx = allData.findIndex(d => d.id === editId);
        if (idx !== -1) allData[idx] = { ...allData[idx], ...record };
      } else {
        allData.unshift({ id: generateId(), created_at: new Date().toISOString(), ...record });
      }

      saveData();
      updateCategoryFilter();
      renderCards();
      closeModal();
    }

    function openDeleteConfirm(id) {
      deleteTarget = id;
      document.getElementById('delete-overlay').classList.add('active');
      lucide.createIcons();
    }

    function closeDeleteConfirm() {
      deleteTarget = null;
      document.getElementById('delete-overlay').classList.remove('active');
    }

    function confirmDelete() {
      if (!deleteTarget) return;
      allData = allData.filter(d => d.id !== deleteTarget);
      saveData();
      updateCategoryFilter();
      renderCards();
      closeDeleteConfirm();
    }

    loadData();
    updateCategoryFilter();
    renderCards();
    lucide.createIcons();
  </script>
</body>
</html>
