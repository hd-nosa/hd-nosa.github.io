<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상생협력부 소식함</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f6fa; min-height: 100vh; color: #1e1f2e; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
    .modal { background: #fff; border: 1px solid #e8eaf0; border-radius: 16px; width: 100%; max-width: 460px; padding: 32px; position: relative; animation: modalIn 0.25s ease-out; max-height: 90vh; overflow-y: auto; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: linear-gradient(135deg, #4f46e5, #818cf8); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-secondary { padding: 10px 20px; background: #f0f1f7; border: none; border-radius: 8px; color: #9094a8; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-danger { padding: 10px 24px; background: #ef4444; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .field { margin-bottom: 16px; }
    .field label { display: block; color: #9094a8; font-size: 12px; font-weight: 500; margin-bottom: 6px; }
    .field input, .field textarea, .field select { width: 100%; padding: 10px 14px; background: #f8f9fc; border: 1px solid #e0e2ec; border-radius: 8px; color: #333; font-size: 14px; outline: none; font-family: inherit; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #4f46e5; }
    .card-anim { animation: cardIn 0.35s ease-out both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .cat-card { background: #fff; border: 1px solid #e8eaf0; border-radius: 16px; padding: 28px 24px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
    .cat-card:hover { border-color: #4f46e5; box-shadow: 0 4px 20px rgba(0,130,51,0.08); }
    .news-row { background: #fff; border: 1px solid #e8eaf0; border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .news-row:hover { border-color: #4f46e5; box-shadow: 0 2px 12px rgba(0,130,51,0.07); }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #9094a8; font-size: 14px; cursor: pointer; border: none; background: none; font-family: inherit; margin-bottom: 20px; padding: 0; }
    .back-btn:hover { color: #4f46e5; }
    .error-msg { color: #ef4444; font-size: 12px; margin-bottom: 12px; display: none; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 80px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e8eaf0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header style="background:#fff;border-bottom:1px solid #e8eaf0;">
    <div style="max-width:1100px;margin:0 auto;padding:32px 24px 24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <div style="display:flex;align-items:center;gap:14px;cursor:pointer;" onclick="goHome()">
          <div style="width:42px;height:42px;background:linear-gradient(135deg,#4f46e5,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i data-lucide="newspaper" style="width:20px;height:20px;color:#fff;"></i>
          </div>
          <div>
            <h1 style="font-size:20px;font-weight:700;color:#1e1f2e;letter-spacing:-0.5px;">상생협력부 소식함</h1>
            <p style="color:#9094a8;font-size:13px;margin-top:2px;">카드뉴스·교섭 소식·홍보물을 한곳에서</p>
          </div>
        </div>
        <button class="btn-primary" onclick="openAddModal()">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> 등록
        </button>
      </div>
    </div>
  </header>

  <main style="max-width:1100px;margin:0 auto;padding:32px 24px 60px;">
    <div id="view-home"></div>
    <div id="view-category" style="display:none;"></div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal-add" class="overlay">
    <div class="modal">
      <button onclick="closeAddModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:#aaa;"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
      <h2 id="modal-add-title" style="font-size:19px;font-weight:700;margin-bottom:24px;">소식 등록</h2>
      <div class="field"><label>제목 *</label><input id="f-title" placeholder="소식 제목"></div>
      <div class="field"><label>설명</label><textarea id="f-desc" rows="2" placeholder="간단한 설명" style="resize:vertical;"></textarea></div>
      <div class="field">
        <label>링크 URL * <span style="color:#b0b4c8;font-weight:400;">(예: https://hd-nosa.github.io/files/파일명.pdf)</span></label>
        <input id="f-link" placeholder="https://...">
      </div>
      <div style="display:flex;gap:12px;">
        <div class="field" style="flex:1;">
          <label>카테고리 *</label>
          <select id="f-category-select" onchange="handleCategorySelect(this.value)" style="margin-bottom:6px;"><option value="">카테고리 선택</option></select>
          <input id="f-category-new" placeholder="새 카테고리 직접 입력" style="display:none;">
        </div>
        <div class="field" style="flex:1;"><label>발행일</label><input id="f-date" type="date"></div>
      </div>
      <div class="field"><label>비밀번호 *</label><input id="f-password" type="password" placeholder="관리자 비밀번호"></div>
      <div id="add-error" class="error-msg"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn-secondary" onclick="closeAddModal()">취소</button>
        <button class="btn-primary" onclick="handleSubmit()" id="submit-btn">저장</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="modal-delete" class="overlay">
    <div class="modal" style="max-width:360px;text-align:center;">
      <div style="width:48px;height:48px;background:#fef2f2;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i data-lucide="trash-2" style="width:22px;height:22px;color:#ef4444;"></i>
      </div>
      <p style="font-size:16px;font-weight:700;margin-bottom:6px;">삭제하시겠습니까?</p>
      <p style="color:#9094a8;font-size:13px;margin-bottom:20px;">삭제하면 복구할 수 없습니다.</p>
      <div class="field"><label>비밀번호 확인</label><input id="d-password" type="password" placeholder="관리자 비밀번호"></div>
      <div id="delete-error" class="error-msg"></div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn-secondary" onclick="closeDeleteModal()">취소</button>
        <button class="btn-danger" onclick="confirmDelete()" id="delete-btn">삭제</button>
      </div>
    </div>
  </div>

  <script>
    // ───────────────────────────────────────────────
    // ★ 여기를 수정하세요
    const JSONBIN_API_KEY = '$2a$10$Ix/Ox/OIqmwH8wDW/tg/X.3/nEOBFR.x2M8WoGqBrdJcFkQdWyPqG'
    const ADMIN_PASSWORD = '1234'; // ← 비밀번호 변경
    // ───────────────────────────────────────────────

    const JSONBIN_URL = 'https://api.jsonbin.io/v3/b';
    let BIN_ID = localStorage.getItem('songsaeng_bin_id') || null;

    const categoryColors = ['#4f46e5','#f59e0b','#ef4444','#ec4899','#06b6d4','#8b5cf6','#84cc16','#f97316'];
    const colorMap = {};
    let colorIdx = 0;
    function getCatColor(cat) {
      if (!colorMap[cat]) { colorMap[cat] = categoryColors[colorIdx % categoryColors.length]; colorIdx++; }
      return colorMap[cat];
    }

    let allData = [];
    let currentView = 'home';
    let currentCategory = null;
    let editId = null;
    let deleteTarget = null;

    // ── JSONBIN API ──────────────────────────────────

    async function fetchData() {
      showLoading();
      try {
        if (!BIN_ID) {
          // 최초 실행: bin 생성
          const res = await fetch(JSONBIN_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_API_KEY,
              'X-Bin-Name': 'songsaeng',
              'X-Bin-Private': 'true'
            },
            body: JSON.stringify([])
          });
          const json = await res.json();
          BIN_ID = json.metadata.id;
          localStorage.setItem('songsaeng_bin_id', BIN_ID);
          allData = [];
        } else {
          const res = await fetch(`${JSONBIN_URL}/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          });
          const json = await res.json();
          allData = json.record || [];
        }
      } catch(e) {
        allData = [];
      }
      render();
    }

    async function saveData() {
      if (!BIN_ID) return;
      await fetch(`${JSONBIN_URL}/${BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify(allData)
      });
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function getCategories() { return [...new Set(allData.map(d => d.category).filter(Boolean))].sort(); }

    // ── RENDER ───────────────────────────────────────

    function showLoading() {
      document.getElementById('view-home').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
      document.getElementById('view-home').style.display = '';
      document.getElementById('view-category').style.display = 'none';
    }

    function render() {
      if (currentView === 'home') renderHome();
      else renderCategory();
    }

    function renderHome() {
      document.getElementById('view-home').style.display = '';
      document.getElementById('view-category').style.display = 'none';
      const cats = getCategories();
      const el = document.getElementById('view-home');
      if (cats.length === 0) {
        el.innerHTML = `
          <div style="text-align:center;padding:80px 20px;">
            <div style="width:64px;height:64px;background:#eef0f8;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
              <i data-lucide="inbox" style="width:28px;height:28px;color:#c0c4d8;"></i>
            </div>
            <p style="color:#9094a8;font-size:15px;font-weight:500;">등록된 소식이 없습니다</p>
            <p style="color:#b8bcd0;font-size:13px;margin-top:4px;">우측 상단 '등록' 버튼으로 첫 소식을 추가해보세요</p>
          </div>`;
        lucide.createIcons(); return;
      }
      el.innerHTML = `
        <p style="color:#b0b4c8;font-size:12px;margin-bottom:16px;">총 ${cats.length}개 카테고리 · ${allData.length}건의 소식</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;">
          ${cats.map((cat, i) => {
            const count = allData.filter(d => d.category === cat).length;
            const color = getCatColor(cat);
            const latest = allData.filter(d => d.category === cat).sort((a,b) => (b.published_at||b.created_at||'').localeCompare(a.published_at||a.created_at||''))[0];
            const dateStr = latest?.published_at ? new Date(latest.published_at).toLocaleDateString('ko-KR') : '';
            return `
              <div class="cat-card card-anim" style="animation-delay:${i*0.05}s;" onclick="goCategory('${cat}')">
                <div style="width:44px;height:44px;background:${color}18;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
                  <i data-lucide="folder-open" style="width:22px;height:22px;color:${color};"></i>
                </div>
                <div style="font-size:17px;font-weight:700;color:#1e1f2e;margin-bottom:6px;">${cat}</div>
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <span style="font-size:13px;color:#9094a8;">소식 ${count}건</span>
                  ${dateStr ? `<span style="font-size:12px;color:#c0c4d8;">최근 ${dateStr}</span>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>`;
      lucide.createIcons();
    }

    function renderCategory() {
      document.getElementById('view-home').style.display = 'none';
      document.getElementById('view-category').style.display = '';
      const items = allData.filter(d => d.category === currentCategory)
        .sort((a,b) => (b.published_at||b.created_at||'').localeCompare(a.published_at||a.created_at||''));
      const color = getCatColor(currentCategory);
      const el = document.getElementById('view-category');
      el.innerHTML = `
        <button class="back-btn" onclick="goHome()">
          <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 전체 카테고리
        </button>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
          <div style="width:40px;height:40px;background:${color}18;border-radius:10px;display:flex;align-items:center;justify-content:center;">
            <i data-lucide="folder-open" style="width:20px;height:20px;color:${color};"></i>
          </div>
          <div>
            <h2 style="font-size:20px;font-weight:700;color:#1e1f2e;">${currentCategory}</h2>
            <p style="font-size:13px;color:#9094a8;">총 ${items.length}건</p>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${items.length === 0 ? `<p style="color:#9094a8;text-align:center;padding:40px;">등록된 소식이 없습니다</p>` :
            items.map((item, i) => {
              const dateStr = item.published_at ? new Date(item.published_at).toLocaleDateString('ko-KR') : '';
              return `
                <div class="news-row card-anim" style="animation-delay:${i*0.04}s;" onclick="openLink('${item.link||'#'}')">
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:15px;font-weight:600;color:#1e1f2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.title||'제목 없음'}</div>
                    ${item.description ? `<div style="font-size:13px;color:#9094a8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.description}</div>` : ''}
                  </div>
                  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
                    ${dateStr ? `<span style="font-size:12px;color:#c0c4d8;">${dateStr}</span>` : ''}
                    <div style="display:flex;gap:4px;">
                      <button onclick="event.stopPropagation();openEditModal('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#ccc;" onmouseenter="this.style.color='#4f46e5'" onmouseleave="this.style.color='#ccc'">
                        <i data-lucide="edit" style="width:15px;height:15px;"></i>
                      </button>
                      <button onclick="event.stopPropagation();openDeleteModal('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#ccc;" onmouseenter="this.style.color='#ef4444'" onmouseleave="this.style.color='#ccc'">
                        <i data-lucide="trash-2" style="width:15px;height:15px;"></i>
                      </button>
                    </div>
                    <i data-lucide="external-link" style="width:15px;height:15px;color:#c0c4d8;"></i>
                  </div>
                </div>`;
            }).join('')}
        </div>`;
      lucide.createIcons();
    }

    // ── NAVIGATION ───────────────────────────────────

    function goHome() { currentView = 'home'; currentCategory = null; render(); }
    function goCategory(cat) { currentView = 'category'; currentCategory = cat; render(); }
    function openLink(url) { if (url && url !== '#') window.open(url, '_blank', 'noopener,noreferrer'); }

    // ── CATEGORY SELECT ──────────────────────────────

    function refreshCategorySelect() {
      const sel = document.getElementById('f-category-select');
      const cats = getCategories();
      sel.innerHTML = '<option value="">카테고리 선택</option>' +
        cats.map(c => `<option value="${c}">${c}</option>`).join('') +
        '<option value="__new__">+ 새 카테고리 만들기</option>';
    }

    function handleCategorySelect(val) {
      const newInput = document.getElementById('f-category-new');
      if (val === '__new__') { newInput.style.display = ''; newInput.focus(); }
      else { newInput.style.display = 'none'; newInput.value = ''; }
    }

    // ── ADD / EDIT MODAL ─────────────────────────────

    function openAddModal() {
      editId = null;
      document.getElementById('modal-add-title').textContent = '소식 등록';
      ['f-title','f-desc','f-link','f-date','f-password'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-category-new').value = '';
      document.getElementById('f-category-new').style.display = 'none';
      document.getElementById('add-error').style.display = 'none';
      refreshCategorySelect();
      if (currentCategory) document.getElementById('f-category-select').value = currentCategory;
      document.getElementById('modal-add').classList.add('active');
    }

    function openEditModal(id) {
      const item = allData.find(d => d.id === id);
      if (!item) return;
      editId = id;
      document.getElementById('modal-add-title').textContent = '소식 수정';
      document.getElementById('f-title').value = item.title || '';
      document.getElementById('f-desc').value = item.description || '';
      document.getElementById('f-link').value = item.link || '';
      document.getElementById('f-date').value = item.published_at || '';
      document.getElementById('f-password').value = '';
      document.getElementById('f-category-new').value = '';
      document.getElementById('f-category-new').style.display = 'none';
      document.getElementById('add-error').style.display = 'none';
      refreshCategorySelect();
      document.getElementById('f-category-select').value = item.category || '';
      document.getElementById('modal-add').classList.add('active');
    }

    function closeAddModal() { document.getElementById('modal-add').classList.remove('active'); }

    async function handleSubmit() {
      const title = document.getElementById('f-title').value.trim();
      const link = document.getElementById('f-link').value.trim();
      const pw = document.getElementById('f-password').value;
      const selVal = document.getElementById('f-category-select').value;
      const newCat = document.getElementById('f-category-new').value.trim();
      const category = selVal === '__new__' ? newCat : selVal;
      const errEl = document.getElementById('add-error');
      const btn = document.getElementById('submit-btn');

      if (!title) { showError(errEl, '제목을 입력해주세요.'); return; }
      if (!link) { showError(errEl, '링크 URL을 입력해주세요.'); return; }
      if (!category) { showError(errEl, '카테고리를 선택하거나 입력해주세요.'); return; }
      if (pw !== ADMIN_PASSWORD) { showError(errEl, '비밀번호가 올바르지 않습니다.'); return; }

      btn.disabled = true; btn.textContent = '저장 중...';
      const record = {
        title,
        description: document.getElementById('f-desc').value.trim(),
        link, category,
        published_at: document.getElementById('f-date').value,
      };

      if (editId) {
        const idx = allData.findIndex(d => d.id === editId);
        if (idx !== -1) allData[idx] = { ...allData[idx], ...record };
      } else {
        allData.unshift({ id: generateId(), created_at: new Date().toISOString(), ...record });
      }

      await saveData();
      btn.disabled = false; btn.textContent = '저장';
      closeAddModal();
      if (!editId && currentView === 'home') goCategory(category);
      else render();
    }

    // ── DELETE MODAL ─────────────────────────────────

    function openDeleteModal(id) {
      deleteTarget = id;
      document.getElementById('d-password').value = '';
      document.getElementById('delete-error').style.display = 'none';
      document.getElementById('modal-delete').classList.add('active');
    }

    function closeDeleteModal() {
      deleteTarget = null;
      document.getElementById('modal-delete').classList.remove('active');
    }

    async function confirmDelete() {
      const pw = document.getElementById('d-password').value;
      const errEl = document.getElementById('delete-error');
      const btn = document.getElementById('delete-btn');
      if (pw !== ADMIN_PASSWORD) { showError(errEl, '비밀번호가 올바르지 않습니다.'); return; }
      btn.disabled = true; btn.textContent = '삭제 중...';
      allData = allData.filter(d => d.id !== deleteTarget);
      await saveData();
      btn.disabled = false; btn.textContent = '삭제';
      closeDeleteModal();
      if (currentCategory && allData.filter(d => d.category === currentCategory).length === 0) goHome();
      else render();
    }

    function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }

    fetchData();
    lucide.createIcons();
  </script>
</body>
</html>
