<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드뉴스 아카이브</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; box-sizing: border-box; }
    * { box-sizing: border-box; }
    .card-enter { animation: cardIn 0.4s ease-out both; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-in { animation: modalIn 0.3s ease-out; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .tag-pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
  </style>
</head>
<body style="font-family: 'Noto Sans KR', sans-serif; background-color: #0f1117; min-height: 100vh;">
 
  <!-- Header -->
  <header style="background: linear-gradient(135deg, #0f1117 0%, #1a1d2e 50%, #0f1117 100%); border-bottom: 1px solid #ffffff0d;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 40px 24px 32px;">
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 8px;">
        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #a78bfa); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
          <i data-lucide="newspaper" style="width:20px;height:20px;color:#fff;"></i>
        </div>
        <h1 style="font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: #f0f0f5; letter-spacing: -0.5px; margin: 0;">카드뉴스 아카이브</h1>
      </div>
      <p style="color: #8b8fa3; font-size: 14px; margin: 0 0 0 54px;">우리 회사 카드뉴스 모아보기</p>
    </div>
  </header>
 
  <!-- Toolbar -->
  <div style="max-width: 1100px; margin: 0 auto; padding: 24px 24px 0;">
    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;">
      <div style="position: relative; flex: 1; min-width: 200px; max-width: 400px;">
        <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#555;"></i>
        <input id="search-input" type="text" placeholder="제목 또는 카테고리 검색..."
          style="width:100%;padding:10px 14px 10px 38px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;color:#e0e0e8;font-size:13px;outline:none;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#2a2d3e'">
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="category-filter" style="padding:10px 14px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;color:#e0e0e8;font-size:13px;outline:none;">
          <option value="">전체 카테고리</option>
        </select>
        <button onclick="openAddModal()" style="display:flex;align-items:center;gap:6px;padding:10px 20px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> 등록
        </button>
      </div>
    </div>
  </div>
 
  <!-- Stats -->
  <div style="max-width:1100px;margin:0 auto;padding:16px 24px 0;">
    <p id="stats-text" style="color:#555;font-size:12px;">총 0건의 카드뉴스</p>
  </div>
 
  <!-- Card Grid -->
  <main style="max-width:1100px;margin:0 auto;padding:16px 24px 40px;">
    <div id="card-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;"></div>
    <div id="empty-state" style="text-align:center;padding:80px 20px;">
      <div style="width:64px;height:64px;background:#1a1d2e;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i data-lucide="inbox" style="width:28px;height:28px;color:#444;"></i>
      </div>
      <p style="color:#666;font-size:15px;font-weight:500;">등록된 카드뉴스가 없습니다</p>
      <p style="color:#444;font-size:13px;margin-top:4px;">상단의 '등록' 버튼으로 첫 카드뉴스를 추가해보세요</p>
    </div>
  </main>
 
  <!-- Add/Edit Modal -->
  <div id="modal-overlay" class="overlay">
    <div class="modal-in" style="background:#1a1d2e;border:1px solid #2a2d3e;border-radius:16px;width:100%;max-width:480px;padding:32px;position:relative;">
      <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:#666;">
        <i data-lucide="x" style="width:20px;height:20px;"></i>
      </button>
      <h2 id="modal-title" style="font-size:20px;font-weight:700;color:#f0f0f5;margin-bottom:24px;">카드뉴스 등록</h2>
      <div>
        <input type="hidden" id="edit-id" value="">
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#8b8fa3;font-size:12px;font-weight:500;margin-bottom:6px;">제목 *</label>
          <input id="f-title" style="width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;" placeholder="카드뉴스 제목">
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#8b8fa3;font-size:12px;font-weight:500;margin-bottom:6px;">설명</label>
          <textarea id="f-desc" rows="2" style="width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;resize:vertical;" placeholder="간단한 설명"></textarea>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;color:#8b8fa3;font-size:12px;font-weight:500;margin-bottom:6px;">링크 URL *</label>
          <input id="f-link" style="width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;" placeholder="https://...">
        </div>
        <div style="display:flex;gap:12px;margin-bottom:16px;">
          <div style="flex:1;">
            <label style="display:block;color:#8b8fa3;font-size:12px;font-weight:500;margin-bottom:6px;">카테고리</label>
            <input id="f-category" style="width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;" placeholder="예: 마케팅, HR">
          </div>
          <div style="flex:1;">
            <label style="display:block;color:#8b8fa3;font-size:12px;font-weight:500;margin-bottom:6px;">발행일</label>
            <input id="f-date" type="date" style="width:100%;padding:10px 14px;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;">
          </div>
        </div>
        <div id="form-error" style="display:none;color:#f87171;font-size:12px;margin-bottom:12px;"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="closeModal()" style="padding:10px 20px;background:#2a2d3e;border:none;border-radius:8px;color:#8b8fa3;font-size:13px;cursor:pointer;">취소</button>
          <button onclick="handleSubmit()" style="padding:10px 24px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">저장</button>
        </div>
      </div>
    </div>
  </div>
 
  <!-- Delete Confirm -->
  <div id="delete-overlay" class="overlay">
    <div style="background:#1a1d2e;border:1px solid #2a2d3e;border-radius:16px;width:100%;max-width:360px;padding:32px;text-align:center;">
      <div style="width:48px;height:48px;background:#2a1520;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i data-lucide="trash-2" style="width:22px;height:22px;color:#f87171;"></i>
      </div>
      <p style="color:#f0f0f5;font-size:16px;font-weight:600;margin-bottom:6px;">삭제하시겠습니까?</p>
      <p style="color:#666;font-size:13px;margin-bottom:24px;">이 카드뉴스를 삭제하면 복구할 수 없습니다.</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button onclick="closeDeleteConfirm()" style="padding:10px 24px;background:#2a2d3e;border:none;border-radius:8px;color:#8b8fa3;font-size:13px;cursor:pointer;">취소</button>
        <button id="confirm-delete-btn" onclick="confirmDelete()" style="padding:10px 24px;background:#dc2626;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">삭제</button>
      </div>
    </div>
  </div>
 
  <script>
    const STORAGE_KEY = 'cardnews_data';
    let allData = [];
    let deleteTarget = null;
    const categoryColors = ['#6366f1','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#8b5cf6'];
    const categoryColorMap = {};
    let colorIdx = 0;
 
    function getCategoryColor(cat) {
      if (!cat) return '#555';
      if (!categoryColorMap[cat]) {
        categoryColorMap[cat] = categoryColors[colorIdx % categoryColors.length];
        colorIdx++;
      }
      return categoryColorMap[cat];
    }
 
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        allData = raw ? JSON.parse(raw) : [];
      } catch(e) {
        allData = [];
      }
    }
 
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    }
 
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }
 
    function getFilteredData() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      const cat = document.getElementById('category-filter').value;
      return allData.filter(item => {
        const matchQ = !q || (item.title||'').toLowerCase().includes(q) || (item.category||'').toLowerCase().includes(q) || (item.description||'').toLowerCase().includes(q);
        const matchCat = !cat || item.category === cat;
        return matchQ && matchCat;
      }).sort((a,b) => (b.published_at||b.created_at||'').localeCompare(a.published_at||a.created_at||''));
    }
 
    function renderCards() {
      const filtered = getFilteredData();
      const grid = document.getElementById('card-grid');
      const empty = document.getElementById('empty-state');
      const stats = document.getElementById('stats-text');
 
      stats.textContent = `총 ${allData.length}건의 카드뉴스` + (filtered.length !== allData.length ? ` (${filtered.length}건 표시)` : '');
 
      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        filtered.forEach((item, i) => {
          const el = createCardEl(item, i);
          grid.appendChild(el);
        });
      }
      lucide.createIcons();
    }
 
    function createCardEl(item, i) {
      const el = document.createElement('div');
      el.className = 'card-enter';
      el.style.animationDelay = `${i * 0.05}s`;
      const catColor = getCategoryColor(item.category);
      const dateStr = item.published_at ? new Date(item.published_at).toLocaleDateString('ko-KR') : '';
      el.style.cssText = 'background:#1a1d2e;border:1px solid #2a2d3e;border-radius:14px;overflow:hidden;transition:border-color 0.2s;';
      el.onmouseenter = () => el.style.borderColor = '#6366f1';
      el.onmouseleave = () => el.style.borderColor = '#2a2d3e';
      el.innerHTML = `
        <div style="padding:24px;">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
            <div style="flex:1;min-width:0;">
              ${item.category ? `<span class="tag-pill" style="background:${catColor}22;color:${catColor};margin-bottom:8px;">${item.category}</span>` : ''}
              <h3 style="color:#f0f0f5;font-size:16px;font-weight:700;margin:8px 0 0;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title || '제목 없음'}</h3>
            </div>
            <div style="display:flex;gap:4px;margin-left:8px;flex-shrink:0;">
              <button onclick="openEditModal('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#555;" onmouseenter="this.style.color='#818cf8'" onmouseleave="this.style.color='#555'"><i data-lucide="edit" style="width:15px;height:15px;"></i></button>
              <button onclick="openDeleteConfirm('${item.id}')" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:#555;" onmouseenter="this.style.color='#f87171'" onmouseleave="this.style.color='#555'"><i data-lucide="trash-2" style="width:15px;height:15px;"></i></button>
            </div>
          </div>
          ${item.description ? `<p style="color:#8b8fa3;font-size:13px;line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${item.description}</p>` : ''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #2a2d3e;">
            <span style="color:#555;font-size:12px;display:flex;align-items:center;gap:4px;"><i data-lucide="calendar" style="width:12px;height:12px;"></i>${dateStr}</span>
            <a href="${item.link||'#'}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:4px;color:#818cf8;font-size:12px;font-weight:500;text-decoration:none;">
              열기 <i data-lucide="external-link" style="width:12px;height:12px;"></i>
            </a>
          </div>
        </div>
      `;
      return el;
    }
 
    function updateCategoryFilter() {
      const sel = document.getElementById('category-filter');
      const current = sel.value;
      const cats = [...new Set(allData.map(d => d.category).filter(Boolean))].sort();
      sel.innerHTML = '<option value="">전체 카테고리</option>' + cats.map(c => `<option value="${c}"${c===current?' selected':''}>${c}</option>`).join('');
    }
 
    document.getElementById('search-input').addEventListener('input', renderCards);
    document.getElementById('category-filter').addEventListener('change', renderCards);
 
    function openAddModal() {
      document.getElementById('modal-title').textContent = '카드뉴스 등록';
      document.getElementById('edit-id').value = '';
      document.getElementById('f-title').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-link').value = '';
      document.getElementById('f-category').value = '';
      document.getElementById('f-date').value = '';
      document.getElementById('form-error').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }
 
    function openEditModal(id) {
      const item = allData.find(d => d.id === id);
      if (!item) return;
      document.getElementById('modal-title').textContent = '카드뉴스 수정';
      document.getElementById('edit-id').value = id;
      document.getElementById('f-title').value = item.title || '';
      document.getElementById('f-desc').value = item.description || '';
      document.getElementById('f-link').value = item.link || '';
      document.getElementById('f-category').value = item.category || '';
      document.getElementById('f-date').value = item.published_at || '';
      document.getElementById('form-error').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }
 
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }
 
    function handleSubmit() {
      const title = document.getElementById('f-title').value.trim();
      const link = document.getElementById('f-link').value.trim();
      const errEl = document.getElementById('form-error');
 
      if (!title) {
        errEl.textContent = '제목을 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }
      if (!link) {
        errEl.textContent = '링크 URL을 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }
 
      const editId = document.getElementById('edit-id').value;
      const record = {
        title,
        description: document.getElementById('f-desc').value.trim(),
        link,
        category: document.getElementById('f-category').value.trim(),
        published_at: document.getElementById('f-date').value,
      };
 
      if (editId) {
        const idx = allData.findIndex(d => d.id === editId);
        if (idx !== -1) allData[idx] = { ...allData[idx], ...record };
      } else {
        allData.unshift({ id: generateId(), created_at: new Date().toISOString(), ...record });
      }
 
      saveData();
      updateCategoryFilter();
      renderCards();
      closeModal();
    }
 
    function openDeleteConfirm(id) {
      deleteTarget = id;
      document.getElementById('delete-overlay').classList.add('active');
      lucide.createIcons();
    }
 
    function closeDeleteConfirm() {
      deleteTarget = null;
      document.getElementById('delete-overlay').classList.remove('active');
    }
 
    function confirmDelete() {
      if (!deleteTarget) return;
      allData = allData.filter(d => d.id !== deleteTarget);
      saveData();
      updateCategoryFilter();
      renderCards();
      closeDeleteConfirm();
    }
 
    loadData();
    updateCategoryFilter();
    renderCards();
    lucide.createIcons();
  </script>
</body>
</html>
